<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<header>
    <div>
        <img src="img/logo.PNG" alt="site logo" style="height: 40px;">
    </div>

    <nav>
        <a href="index.html" class="active">Dashboard</a>
        <a href="events.html">Events</a>
        <a href="dining.html">Dining</a>
    </nav>
</header>

<main id="dashboard">
    <div class="container">
        <div class="row g-5">

            <div class="col-lg-4 col-md-6 col-12">
                <section class="weather-card">
                    <h2>Campus Weather</h2>
                    <div class="section-divider"></div>
                    <p class="subheader">Live conditions for Chicago IL</p>
                    

                    <button class="btn-gold mb-3" id="weather-btn">Get Weather</button>

                    <div id="weather-result" class="mb-3"></div>

                    <div id="weather-display" style="display:none;">
                        <div id="temp" class="fs-1 fw-bold"></div>
                        <div id="condition" class="mb-2"></div>
                        <div id="humidity"></div>
                        <div id="wind"></div>
                    </div>
                </section> 
            </div>
    
            <div class="col--4 col-md-6 col-12">
                <section class="quick-actions-card">
                    <h2 class="mb-3">Quick Actions</h2>
                    <div class="section-divider"></div>

                    <div class="qa-grid">

                        <a href="events.html" class="qa-tile">
                            <div class="qa-emoji">📅</div>
                            <p>View Events</p>
                        </a>

                        <a href="dining.html" class="qa-tile">
                            <div class="qa-emoji">🍽️</div>
                            <p>Dining Hours</p>
                        </a>

                        <a href="Campus_map.html" class="qa-tile">
                            <div class="qa-emoji">🗺️</div>
                            <p>Campus Map</p>
                        </a>

                        <a href="Report_issue.html" class="qa-tile">
                            <div class="qa-emoji">⚠️</div>
                            <p>Report Issue</p>
                        </a>

                    </div>
                </section>
            </div>

             <div class="col-lg-4 col-md-6 col-12">
                <section class="status-card">
                    <h2 class="mb-3">Status</h2>
                    <div class="section-divider"></div>

                    <div class="status-box">
                        <p class="status-number">3</p>
                        <p class="status-label">Events</p>

                        <p class="status-number">1 out of 4</p>
                        <p class="status-label">Dining</p>

                        <p class="status-number text-success">OK</p>
                        <p class="status-label">System Status</p>
                    </div>
                </section>
            </div>

        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>@2026 College_life_Campus_App_Bryan_C -
            <a href="#">North Park University</a> · Chicago, IL
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src = "js/style.js"></script>

</body>
</html>
