<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report_issue</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/report_page.css">
    </head>
    <body>

        <header>
        <div>
            <img src="img/logo.PNG" alt="site logo" style="height: 40px;">
        </div>
            <nav>
                <a href="index.html" class="active">Dashboard</a>
                <a href="events.html" class="active">Events</a>
                <a href="dining.html" class="active">Dining</a>
            </nav>
        </header>

        <main id="issue" class="map-container">
            <h2>Report an Issue</h2>
            <div class="section-divider"></div>

            <form class="report-form">

                <div class="mb-3">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Location on Campus</label>
                    <input type="text" class="form-control" placeholder="Example: Johnson Center">
                </div>

                <div class="mb-3">
                    <label class="form-label">Issue Category</label>
                    <select class="form-select" required>
                        <option value="">Select a Category</option>
                        <option>Maintanece</option>
                        <option>Safety</option>
                        <option>IT</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="5" placeholder="Describe the issue  . . ." required></textarea>
                </div>

            </form>
        </main>

        <footer>
            <div class="container">
                <p>@2026 College_life_Campus_App_Bryan_C - <a href="#">North Park University</a> · Chicago, IL</p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src = "/js/style.js"></script>
    </body>
</html>
