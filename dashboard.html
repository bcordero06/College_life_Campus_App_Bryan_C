<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

    <header>
        <div>
            <img src="img/logo.PNG" alt="site logo" style="height: 40px;">
        </div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="events.html">Events</a>
            <a href="dining.html">Dining</a>
        </nav>
    </header class="p-3">

    <main id="dashboard">

        <section class="weather-section">
            <div class="container">

                <div class="text-center mb-4">
                    <h2 class="section-title">Campus<span>Weather</span></h2>
                    <div class="section-divider mx-auto"></div>
                    <p class="section-subtitle">Live conditions for Chicago, IL</p>
                </div>

                <div class="weather-card p-4 rounded-4 shadow-sm">
                    <h3> Current Weather</h3>
                    <div class="location"> North Park University, Chicago</div>

                    <button class="btn-gold" id="weather-btn">
                        Get Weather
                    </button>

                    <div id="weather-result" class="mb-3"></div>

                    <div id="weather-display" style="display:none;">
                        <div id="temp" class="fs-1 fw-bold"></div>
                        <div id="condition" class="mb-2"></div>
                        <div id="humidity"></div>
                        <div id="wind"></div>
                    </div>
                </div>
                
            </div>
        </section>

        <section>
            <h2>Quick Actions</h2>

            <div>
                <div>X</div>
                <button>Action 1</button>
            </div>

            <div>
                <div>X</div>
                <button>Action 2</button>
            </div>

            <div>
                <div>X</div>
                <button>Action 3</button>
            </div>

            <div>
                <div>X</div>
                <button>Action 4</button>
            </div>
        </section>

        <section>
            <h2>Status</h2>
            <p>Events: 8</p>
            <p>Dining: 5/7</p>
            <p>Status: OK</p>
        </section>

    </main>

    <footer>
        <div class="container">
            <p>@2026 College_life_Campus_App_Bryan_C - <a href="#">North Park University</a> · Chicago, IL</p>
        </div>
    </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src = "/js/style.js"></script>
    </body>
</html>
